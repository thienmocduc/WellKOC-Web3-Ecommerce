version: "3.9"

# WellKOC Platform — Local Development Stack
# Run: docker-compose up -d

services:
  # ── PostgreSQL 16 + pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wellkoc
      POSTGRES_PASSWORD: wellkoc_dev_2026
      POSTGRES_DB: wellkoc
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - wk_postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellkoc -d wellkoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wk_redis
    restart: unless-stopped
    command: redis-server --requirepass wellkoc_redis_2026 --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - wk_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "wellkoc_redis_2026", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Elasticsearch 8 ───────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.15.3
    container_name: wk_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - wk_es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wk_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://wellkoc:wellkoc_dev_2026@postgres:5432/wellkoc
      - REDIS_URL=redis://:wellkoc_redis_2026@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wk_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://wellkoc:wellkoc_dev_2026@postgres:5432/wellkoc
      - REDIS_URL=redis://:wellkoc_redis_2026@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ── Celery Beat (scheduler) ────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wk_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://wellkoc:wellkoc_dev_2026@postgres:5432/wellkoc
      - REDIS_URL=redis://:wellkoc_redis_2026@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Frontend (React + Vite) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wk_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/ws

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: wk_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - wk_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: wk_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: wellkoc_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - wk_grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Flower (Celery monitor) ────────────────────────────────
  flower:
    image: mher/flower:latest
    container_name: wk_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://:wellkoc_redis_2026@redis:6379/0
      FLOWER_UNAUTHENTICATED_API: "true"
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  wk_postgres_data:
  wk_redis_data:
  wk_es_data:
  wk_prometheus_data:
  wk_grafana_data:

networks:
  default:
    name: wellkoc_network
